# ============================================================
#  LiteLLM Proxy — config.yaml
#    ali-*   -> Alibaba / Qwen Coding Plan
#    or-*    -> OpenRouter
#    *:cloud -> Ollama Cloud
#    cpa-openai* -> CLIProxyAPI (Codex OAuth via local proxy)
#    copilot-* -> GitHub Copilot
# ============================================================

include:
  - configs/alibaba.yaml
  - configs/openrouter.yaml
  - configs/ollama-cloud.yaml
  - configs/opencode.yaml
  - configs/cliproxyapi.yaml
  - configs/github-copilot.yaml

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  request_timeout: 600
  drop_params: true
