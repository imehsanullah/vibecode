# ============================================================
#  LiteLLM Proxy — config.yaml
#    ali-*   →  Alibaba / Qwen Coding Plan
#    or-*    →  OpenRouter
#    *:cloud →  Ollama Cloud
#    cliproxyapi-* →  CLIProxyAPI (Codex OAuth via local proxy)
#
# ============================================================

model_list:

